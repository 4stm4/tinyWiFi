# /etc/nanodns/config — TinyWifi DNS (nanodns)
listen=0.0.0.0:53
domain=lan
router_name=router
router_ip=192.168.44.1
upstream=1.1.1.1:53
upstream=8.8.8.8:53
lease_file=/var/lib/nanodhcp/leases
cache=true
cache_max_entries=512
cache_ttl=60
captive=false
record=router.lan,A,192.168.44.1,60
record=admin.lan,A,192.168.44.1,60
